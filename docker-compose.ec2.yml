# EC2 production deployment — external database (Supabase / RDS / self-hosted)
# No local postgres container. All credentials come from .env
#
# Usage:
#   docker compose -f docker-compose.ec2.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:3001"        # ALB / internet → port 80 on host → port 3001 in container
    env_file:
      - backend/.env     # NODE_ENV, PORT, DATABASE_URL, JWT_SECRET
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uploads:
