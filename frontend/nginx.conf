server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── ALB / CloudFront: trust forwarded headers ─────────────
    # CloudFront → ALB → EC2:80 (this container).
    # The real client proto/IP arrive via X-Forwarded-* headers.
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from  0.0.0.0/0;

    # ── Health-check endpoint (ALB target-group check) ────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # ── Proxy API calls to backend ────────────────────────────
    location /api/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Pass real client info (forwarded by ALB/CloudFront)
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host    $host;

        proxy_cache_bypass $http_upgrade;

        # Allow large PDF / question-bank uploads
        client_max_body_size 100M;

        # Generous timeout for PDF processing
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }

    # ── SPA routing — serve index.html for all non-file routes ─
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;
}
